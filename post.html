        <!-- Google fonts -->

        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700,800" rel="stylesheet" />

        <!-- Custom styles for this page -->

            .post-heading .subheading {
                color: #ffddaa;
                font-size: 1.6rem;
                font-style: italic;
                text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            }
        </style>
    </head>

    <body>
        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
            <div class="container px-4 px-lg-5">

                <!-- Brand (no link) -->
                <span class="navbar-brand">Boston Jacobs</span>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive">
                    Menu <i class="fas fa-bars"></i>
                </button>

                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto py-4 py-lg-0">
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="home.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="about.html">Resume</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="post.html">Game</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Page Header -->
        <header class="masthead">
            <div class="container position-relative px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="post-heading text-center">
                            <h1>Rock, Paper, Scissors</h1>
                            <h2 class="subheading">Play against the computer!</h2>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Game Content -->
        <article class="mb-4">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7 text-center">

                        <h1 class="mb-4">Choose Your Move</h1>
                        <p class="lead">Click a button below to play.</p>

                        <div class="my-4">
                            <button class="btn btn-danger m-2" onclick="play('rock')">Rock</button>
                            <button class="btn btn-warning m-2" onclick="play('paper')">Paper</button>
                            <button class="btn btn-success m-2" onclick="play('scissors')">Scissors</button>
                        </div>

                        <h3 id="result" class="mt-4">Make your move!</h3>

                    </div>
                </div>
            </div>
        </article>

        <!-- Footer -->
        <footer class="border-top">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">

                        <!-- Social icons (no links) -->
                        <ul class="list-inline text-center">
                            <li class="list-inline-item">
                                <span class="fa-stack fa-lg">
                                    <i class="fas fa-circle fa-stack-2x"></i>
                                    <i class="fab fa-twitter fa-stack-1x fa-inverse"></i>
                                </span>
                            </li>

                            <li class="list-inline-item">
                                <span class="fa-stack fa-lg">
                                    <i class="fas fa-circle fa-stack-2x"></i>
                                    <i class="fab fa-facebook-f fa-stack-1x fa-inverse"></i>
                                </span>
                            </li>

                            <li class="list-inline-item">
                                <span class="fa-stack fa-lg">
                                    <i class="fas fa-circle fa-stack-2x"></i>
                                    <i class="fab fa-github fa-stack-1x fa-inverse"></i>
                                </span>
                            </li>
                        </ul>

                        <div class="small text-center text-muted fst-italic">
                            Copyright © Crestwood Crafters LLC 2026
                        </div>

                    </div>
                </div>
            </div>
        </footer>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Game Script -->
        <script>
            function play(playerChoice) {
                const choices = ["rock", "paper", "scissors"];
                const computerChoice = choices[Math.floor(Math.random() * 3)];

                let result = "";

                if (playerChoice === computerChoice) {
                    result = "It's a tie! You both chose " + playerChoice;
                } else if (
                    (playerChoice === "rock" && computerChoice === "scissors") ||
                    (playerChoice === "paper" && computerChoice === "rock") ||
                    (playerChoice === "scissors" && computerChoice === "paper")
                ) {
                    result = "You win! " + playerChoice + " beats " + computerChoice;
                } else {
                    result = "You lose! " + computerChoice + " beats " + playerChoice;
                }

                document.getElementById("result").innerText = result;
            }
        </script>
    </body>
</html>
